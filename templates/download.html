    <script>
        /**
         * Platform icon SVG templates
         * These match the icons from the landing page
         */
        const platformIcons = {
            'Instagram': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
            </svg>`,
            
            'Facebook': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>`,
            
            'TikTok': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/>
            </svg>`,
            
            'X': `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>`
        };

        /**
         * Load and display the selected platform icon
         * Called when the page loads
         */
        function loadPlatformIcon() {
            // Step 1: Retrieve the selected platform from localStorage
            const selectedPlatform = localStorage.getItem('selectedPlatform');
            
            // Step 2: Get the platform circle element
            const platformCircle = document.getElementById('platformCircle');
            
            // Step 3: Check if a valid platform is found
            if (selectedPlatform && platformIcons[selectedPlatform]) {
                // If valid platform exists, inject the corresponding icon
                platformCircle.innerHTML = platformIcons[selectedPlatform];
                
                // Log for debugging
                console.log('Platform loaded:', selectedPlatform);
            } else {
                // If no platform or invalid platform, leave circle empty
                // Circle will show default turquoise color (#6af0f0) from CSS
                platformCircle.innerHTML = '';
                
                // Log for debugging
                console.log('No platform selected, showing default circle');
            }
        }

        /**
         * Handle back button click
         * Navigate back to the landing page
         */
        function goBack() {
            // Navigate back to index.html
            window.location.href = '{{ url_for("home") }}';
        }

        /**
         * Show error message to user
         */
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 5000);
            } else {
                alert(message);
            }
        }

        /**
         * Show loading state
         */
        function setLoading(isLoading) {
            const downloadButton = document.querySelector('.download-button');
            const linkInput = document.getElementById('videoLink');
            
            if (isLoading) {
                downloadButton.style.opacity = '0.6';
                downloadButton.style.cursor = 'not-allowed';
                linkInput.disabled = true;
                downloadButton.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="spinner">
                        <circle cx="12" cy="12" r="10" stroke="white" stroke-width="4" fill="none" stroke-dasharray="31.416" stroke-dashoffset="31.416">
                            <animate attributeName="stroke-dasharray" dur="2s" values="0 31.416;15.708 15.708;0 31.416;0 31.416" repeatCount="indefinite"/>
                            <animate attributeName="stroke-dashoffset" dur="2s" values="0;-15.708;-31.416;-31.416" repeatCount="indefinite"/>
                        </circle>
                    </svg>
                `;
            } else {
                downloadButton.style.opacity = '1';
                downloadButton.style.cursor = 'pointer';
                linkInput.disabled = false;
                downloadButton.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                    </svg>
                `;
            }
        }

        /**
         * Handle download button click
         * Validate input and process download request
         */
        async function downloadVideo() {
            // Get the input field and its value
            const linkInput = document.getElementById('videoLink');
            const link = linkInput.value.trim();
            
            // Validate that a link has been entered
            if (link === '') {
                showError('Please paste a video link.');
                return;
            }

            // Basic URL validation
            if (!link.startsWith('http://') && !link.startsWith('https://')) {
                showError('Please enter a valid URL starting with http:// or https://');
                return;
            }

            // Get selected platform from localStorage
            const selectedPlatform = localStorage.getItem('selectedPlatform') || 'youtube';
            
            // Set loading state
            setLoading(true);
            
            try {
                // Make API request to backend
                const response = await fetch('{{ url_for("download_video") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        url: link,
                        platform: selectedPlatform
                    })
                });

                if (response.ok) {
                    // Get the blob from response
                    const blob = await response.blob();
                    
                    // Create download link
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    
                    // Get filename from Content-Disposition header or use default
                    const contentDisposition = response.headers.get('Content-Disposition');
                    let filename = 'video.mp4';
                    if (contentDisposition) {
                        const filenameMatch = contentDisposition.match(/filename="?(.+)"?/i);
                        if (filenameMatch) {
                            filename = filenameMatch[1];
                        }
                    }
                    
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                    
                    // Clear input after successful download
                    linkInput.value = '';
                } else {
                    // Handle error response
                    const errorData = await response.json();
                    showError(errorData.error || 'Download failed. Please try again.');
                }
            } catch (error) {
                console.error('Download error:', error);
                showError('Network error. Please check your connection and try again.');
            } finally {
                // Reset loading state
                setLoading(false);
            }
        }

        /**
         * Add Enter key support for the input field
         * Pressing Enter will trigger the download function
         */
        document.addEventListener('DOMContentLoaded', function() {
            // Load the platform icon when page loads
            loadPlatformIcon();
            
            // Add Enter key listener to input field
            const inputField = document.getElementById('videoLink');
            inputField.addEventListener('keypress', function(event) {
                if (event.key === 'Enter' && !inputField.disabled) {
                    downloadVideo();
                }
            });

            // Focus on input field when page loads
            inputField.focus();
        });
    </script>
</body>
