<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>download page</title>
</head>
<body>
    <div class="main-content">
        <div class="download-top-row">
            <div class="back-button-container">
                <div class="back-button" onclick="goBack()">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                </div>
            </div>
            <a href="{{ url_for('history_page') }}" class="nav-link nav-link-light">History</a>
        </div>

        <div class="platform-circle" id="platformCircle"></div>

        <div class="input-section">
            <div class="input-wrapper">
                <input
                    type="text"
                    class="input-box"
                    id="videoLink"
                    placeholder="@paste link here"
                >
                <div id="platformBadge" class="platform-badge is-hidden"></div>
            </div>
            <button type="button" class="download-button" id="downloadButton" onclick="downloadVideo()">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
            </button>
        </div>

        <div id="metadataSkeleton" class="preview-card preview-skeleton is-hidden">
            <div class="preview-thumb-skeleton"></div>
            <div class="preview-meta-skeleton">
                <div class="skeleton-line"></div>
                <div class="skeleton-line short"></div>
                <div class="skeleton-line tiny"></div>
            </div>
        </div>

        <div id="previewCard" class="preview-card is-hidden">
            <img id="previewThumbnail" class="preview-thumbnail" alt="Video thumbnail">
            <div class="preview-meta">
                <h3 id="previewTitle" class="preview-title"></h3>
                <p id="previewUploader" class="preview-uploader"></p>
                <p id="previewDuration" class="preview-duration"></p>
            </div>
        </div>

        <div id="formatSection" class="format-selector-section is-hidden">
            <label for="formatSelector" class="format-select-label">Quality and format</label>
            <select id="formatSelector" class="format-select"></select>
        </div>

        <div id="progressSection" class="download-progress is-hidden">
            <div id="progressStatus" class="progress-status">Preparing...</div>
            <div class="progress-track">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="progressPercent" class="progress-percent">0%</div>
        </div>

        <div id="errorMessage" class="error-message is-hidden"></div>
    </div>

        <div class="footer-text">Connect with Us @Deep</div>
        <div class="footer-icons">

    <script>
        const API_DOWNLOAD_URL = '{{ url_for("download_video") }}';
        const API_METADATA_URL = '{{ url_for("video_metadata") }}';

        const platformIcons = {
            youtube: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.5 31.5 0 0 0 0 12a31.5 31.5 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.5 31.5 0 0 0 24 12a31.5 31.5 0 0 0-.5-5.8zM9.75 15.5v-7l6.5 3.5-6.5 3.5z"/></svg>',
            instagram: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>',
            facebook: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>',
            tiktok: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>',
            twitter: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>',
        };

        const platformMatchers = [
            { key: 'youtube', name: 'YouTube', domains: ['youtube.com', 'youtu.be', 'youtube-nocookie.com'] },
            { key: 'instagram', name: 'Instagram', domains: ['instagram.com', 'instagr.am'] },
            { key: 'facebook', name: 'Facebook', domains: ['facebook.com', 'fb.watch'] },
            { key: 'tiktok', name: 'TikTok', domains: ['tiktok.com', 'douyin.com'] },
            { key: 'twitter', name: 'X (Twitter)', domains: ['x.com', 'twitter.com', 't.co'] },
        ];

        let metadataDebounceId = null;
        let statusTimeoutId = null;
        let retryCountdownId = null;
        let isDownloading = false;
        let activeMetadataRequest = 0;
        let latestMetadata = null;
        let currentFileName = 'video.mp4';

        function goBack() {
            window.location.href = '{{ url_for("home") }}';
        }

        function getSelectedPlatform() {
            return localStorage.getItem('selectedPlatform') || 'youtube';
        }

        function loadPlatformCircle() {
            const selectedPlatform = getSelectedPlatform();
            const circle = document.getElementById('platformCircle');
            const icon = platformIcons[selectedPlatform] || platformIcons.youtube;
            circle.innerHTML = icon;
        }

        function showStatus(message, isError = true, persist = false) {
            const statusDiv = document.getElementById('errorMessage');
            if (statusTimeoutId) {
                clearTimeout(statusTimeoutId);
                statusTimeoutId = null;
            }

            statusDiv.textContent = message;
            statusDiv.classList.remove('is-hidden');
            statusDiv.classList.toggle('success', !isError);

            if (!persist) {
                statusTimeoutId = setTimeout(() => {
                    statusDiv.classList.add('is-hidden');
                    statusDiv.classList.remove('success');
                }, isError ? 6000 : 2500);
            }
        }

        function showError(message, persist = false) {
            showStatus(message, true, persist);
        }

        function showSuccess(message) {
            showStatus(message, false, false);
        }

        function clearRetryCountdown() {
            if (retryCountdownId) {
                clearInterval(retryCountdownId);
                retryCountdownId = null;
            }
        }

        function showRateLimitCountdown(retryAfterSeconds) {
            clearRetryCountdown();
            let remaining = Number.isFinite(retryAfterSeconds) ? retryAfterSeconds : 60;
            remaining = Math.max(1, Math.floor(remaining));
            showError(`Too many requests. Please wait ${remaining} seconds.`, true);

            retryCountdownId = setInterval(() => {
                remaining -= 1;
                if (remaining <= 0) {
                    clearRetryCountdown();
                    showError('You can try again now.');
                    return;
                }
                showError(`Too many requests. Please wait ${remaining} seconds.`, true);
            }, 1000);
        }

        function setDownloadingState(active) {
            isDownloading = active;
            const button = document.getElementById('downloadButton');
            const input = document.getElementById('videoLink');

            button.disabled = active;
            input.disabled = active;
            button.style.opacity = active ? '0.6' : '1';
            button.style.cursor = active ? 'not-allowed' : 'pointer';
        }

        function detectPlatformFromUrl(rawUrl) {
            if (!rawUrl || (!rawUrl.startsWith('http://') && !rawUrl.startsWith('https://'))) {
                return null;
            }

            try {
                const parsed = new URL(rawUrl);
                const hostname = parsed.hostname.toLowerCase();
                for (const item of platformMatchers) {
                    if (item.domains.some((domain) => hostname === domain || hostname.endsWith(`.${domain}`))) {
                        return item;
                    }
                }
            } catch (_error) {
                return null;
            }
            return null;
        }

        function updatePlatformBadge(rawUrl) {
            const badge = document.getElementById('platformBadge');
            const detected = detectPlatformFromUrl(rawUrl);
            if (!detected) {
                badge.classList.add('is-hidden');
                badge.innerHTML = '';
                return;
            }

            badge.innerHTML = `${platformIcons[detected.key] || ''}<span>${detected.name} detected</span>`;
            badge.classList.remove('is-hidden');
        }

        function formatDuration(seconds) {
            if (!Number.isFinite(seconds) || seconds < 0) {
                return '--:--';
            }
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${String(secs).padStart(2, '0')}`;
        }

        function showMetadataSkeleton(visible) {
            const skeleton = document.getElementById('metadataSkeleton');
            skeleton.classList.toggle('is-hidden', !visible);
        }

        function hidePreviewAndFormats() {
            latestMetadata = null;
            document.getElementById('previewCard').classList.add('is-hidden');
            document.getElementById('formatSection').classList.add('is-hidden');
            document.getElementById('formatSelector').innerHTML = '';
            showMetadataSkeleton(false);
        }

        function renderMetadata(metadata) {
            const previewCard = document.getElementById('previewCard');
            const thumbnail = document.getElementById('previewThumbnail');
            const title = document.getElementById('previewTitle');
            const uploader = document.getElementById('previewUploader');
            const duration = document.getElementById('previewDuration');
            const selector = document.getElementById('formatSelector');
            const formatSection = document.getElementById('formatSection');

            thumbnail.src = metadata.thumbnail || '';
            thumbnail.alt = metadata.title || 'Video thumbnail';
            title.textContent = metadata.title || 'Untitled video';
            uploader.textContent = metadata.uploader || 'Unknown uploader';
            duration.textContent = `Duration: ${formatDuration(Number(metadata.duration))}`;
            previewCard.classList.remove('is-hidden');
            const rawTitle = (metadata.title || 'video').trim();
            const sanitizedTitle = rawTitle.replace(/[^A-Za-z0-9._-]+/g, '_').replace(/^_+|_+$/g, '');
            currentFileName = `${sanitizedTitle || 'video'}.mp4`;

            selector.innerHTML = '';
            const formats = Array.isArray(metadata.formats) ? metadata.formats : [];
            formats.forEach((item) => {
                const option = document.createElement('option');
                option.value = item.format_id || '';
                option.textContent = item.label || `${item.ext || ''}`.trim();
                selector.appendChild(option);
            });

            formatSection.classList.toggle('is-hidden', formats.length === 0);
        }

        async function fetchMetadata(urlValue) {
            activeMetadataRequest += 1;
            const requestId = activeMetadataRequest;

            showMetadataSkeleton(true);
            document.getElementById('previewCard').classList.add('is-hidden');
            document.getElementById('formatSection').classList.add('is-hidden');

            try {
                const response = await fetch(API_METADATA_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlValue }),
                });

                if (requestId !== activeMetadataRequest) {
                    return;
                }

                if (!response.ok) {
                    hidePreviewAndFormats();
                    return;
                }

                const payload = await response.json();
                if (!payload || typeof payload !== 'object') {
                    hidePreviewAndFormats();
                    return;
                }

                latestMetadata = payload;
                showMetadataSkeleton(false);
                renderMetadata(payload);
            } catch (_error) {
                if (requestId === activeMetadataRequest) {
                    hidePreviewAndFormats();
                }
            }
        }

        function debounceMetadataFetch(rawUrl) {
            if (metadataDebounceId) {
                clearTimeout(metadataDebounceId);
                metadataDebounceId = null;
            }

            const urlValue = rawUrl.trim();
            if (!urlValue || (!urlValue.startsWith('http://') && !urlValue.startsWith('https://'))) {
                hidePreviewAndFormats();
                return;
            }

            metadataDebounceId = setTimeout(() => {
                fetchMetadata(urlValue);
            }, 600);
        }

        function getFilenameFromDisposition(contentDisposition) {
            if (!contentDisposition) {
                return 'video.mp4';
            }

            const utf8NameMatch = contentDisposition.match(/filename\*=UTF-8''([^;]+)/i);
            if (utf8NameMatch && utf8NameMatch[1]) {
                try {
                    return decodeURIComponent(utf8NameMatch[1].trim());
                } catch (_error) {
                    // Ignore decode issues and fallback below.
                }
            }

            const quotedNameMatch = contentDisposition.match(/filename=\"?([^\";]+)\"?/i);
            if (quotedNameMatch && quotedNameMatch[1]) {
                return quotedNameMatch[1].trim();
            }

            return 'video.mp4';
        }

        async function extractErrorMessage(response) {
            const fallback = 'Download failed. Please try again.';
            const contentType = (response.headers.get('Content-Type') || '').toLowerCase();

            if (contentType.includes('application/json')) {
                try {
                    const payload = await response.json();
                    if (payload && typeof payload.error === 'string' && payload.error.trim()) {
                        return payload.error.trim();
                    }
                } catch (_error) {
                    return fallback;
                }
            }

            try {
                const text = await response.text();
                if (text && !text.trim().startsWith('<')) {
                    return text.trim();
                }
            } catch (_error) {
                return fallback;
            }
            return fallback;
        }

        function setProgressState(statusLabel, percentValue, isError = false) {
            const section = document.getElementById('progressSection');
            const status = document.getElementById('progressStatus');
            const fill = document.getElementById('progressFill');
            const percent = document.getElementById('progressPercent');

            section.classList.remove('is-hidden');
            section.classList.toggle('error', isError);
            status.textContent = statusLabel;
            fill.classList.toggle('error', isError);
            fill.style.width = `${Math.max(0, Math.min(100, percentValue))}%`;
            percent.textContent = `${Math.max(0, Math.min(100, Math.round(percentValue)))}%`;
        }

        function saveDownloadHistory(entry) {
            try {
                const raw = localStorage.getItem('download_history');
                const parsed = raw ? JSON.parse(raw) : [];
                const history = Array.isArray(parsed) ? parsed : [];
                history.unshift(entry);
                const trimmed = history.slice(0, 50);
                localStorage.setItem('download_history', JSON.stringify(trimmed));
            } catch (_error) {
                // Ignore storage errors so download flow is unaffected.
            }
        }

        async function downloadVideo() {
            if (isDownloading) {
                return;
            }

            clearRetryCountdown();
            const input = document.getElementById('videoLink');
            const urlValue = input.value.trim();
            if (!urlValue) {
                showError('Please paste a video link.');
                return;
            }
            if (!urlValue.startsWith('http://') && !urlValue.startsWith('https://')) {
                showError('Please enter a valid URL starting with http:// or https://');
                return;
            }

            const selector = document.getElementById('formatSelector');
            const selectedFormatId = selector.value || '';
            const selectedOption = selector.options[selector.selectedIndex];
            const selectedFormatLabel = selectedOption ? selectedOption.text : 'Auto';
            const detected = detectPlatformFromUrl(urlValue);

            const payload = {
                url: urlValue,
                platform: getSelectedPlatform(),
                download_type: selectedFormatId === 'audio-only' ? 'audio' : 'video',
                quality: 'best',
            };
            if (selectedFormatId) {
                payload.format_id = selectedFormatId;
            }

            isDownloading = true;
            setDownloadingState(true);
            setProgressState('Connecting...', 0, false);

            try {
                const response = await fetch(API_DOWNLOAD_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                if (response.status === 429) {
                    setProgressState('Rate limited', 100, true);
                    let retryAfter = 60;
                    try {
                        const ratePayload = await response.json();
                        if (ratePayload && Number.isFinite(Number(ratePayload.retry_after))) {
                            retryAfter = Number(ratePayload.retry_after);
                        }
                    } catch (_error) {
                        retryAfter = 60;
                    }
                    showRateLimitCountdown(retryAfter);
                    return;
                }

                if (!response.ok) {
                    setProgressState('Error', 100, true);
                    showError(await extractErrorMessage(response));
                    return;
                }

                const contentLength = response.headers.get('Content-Length');
                const total = contentLength ? parseInt(contentLength, 10) : null;
                const reader = response.body.getReader();
                const chunks = [];
                let received = 0;
                setProgressState('Downloading...', 0, false);

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) {
                        break;
                    }
                    chunks.push(value);
                    received += value.length;
                    if (total) {
                        const pct = Math.min(99, Math.round((received / total) * 100));
                        setProgressState(`Downloading... ${pct}%`, pct, false);
                    }
                }

                setProgressState('Saving...', 100, false);
                const blob = new Blob(chunks, { type: 'video/mp4' });
                if (!blob || blob.size === 0) {
                    setProgressState('Error', 100, true);
                    showError('Download failed: empty file received.');
                    return;
                }

                const downloadUrl = window.URL.createObjectURL(blob);
                const anchor = document.createElement('a');
                const filename = currentFileName || 'video.mp4';
                anchor.href = downloadUrl;
                anchor.download = filename;
                document.body.appendChild(anchor);
                anchor.click();
                document.body.removeChild(anchor);
                window.URL.revokeObjectURL(downloadUrl);

                setProgressState('Done!', 100, false);
                showSuccess('Download started successfully.');

                saveDownloadHistory(
                    {
                        title: (latestMetadata && latestMetadata.title) || filename.replace(/\.[^.]+$/, ''),
                        thumbnail: (latestMetadata && latestMetadata.thumbnail) || '',
                        platform: (latestMetadata && latestMetadata.platform) || (detected && detected.name) || 'unknown',
                        url: urlValue,
                        timestamp: Date.now(),
                        format_label: selectedFormatLabel,
                    }
                );
            } catch (_error) {
                setProgressState('Error', 100, true);
                showError('Network error. Please check your connection and try again.');
            } finally {
                isDownloading = false;
                setDownloadingState(false);
            }
        }

        function onUrlInputChanged() {
            const urlValue = document.getElementById('videoLink').value;
            updatePlatformBadge(urlValue);
            debounceMetadataFetch(urlValue);
        }

        function applyPrefilledUrl() {
            const params = new URLSearchParams(window.location.search);
            const prefilledUrl = params.get('url');
            if (!prefilledUrl) {
                return;
            }
            const input = document.getElementById('videoLink');
            input.value = prefilledUrl;
            onUrlInputChanged();
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadPlatformCircle();
            applyPrefilledUrl();

            const input = document.getElementById('videoLink');
            input.addEventListener('input', onUrlInputChanged);
            input.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' && !isDownloading) {
                    event.preventDefault();
                    downloadVideo();
                }
            });

            input.focus();
        });
    </script>
</body>
</html>
