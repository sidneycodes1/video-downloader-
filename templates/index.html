            <!-- Platform Label -->
            <div class="platform-label">CHOOSE A PLATFORM</div>
        </div>
    </div>

    <script>
        /**
         * Initialize platform selection functionality
         * Attach click event listeners to all platform icons
         */
        function initializePlatformSelection() {
            // Get all platform icon elements
            const platformIcons = document.querySelectorAll('.platform-icon');
            
            // Add click event listener to each platform icon
            platformIcons.forEach(icon => {
                icon.addEventListener('click', function() {
                    // Get the platform name from the data-platform attribute
                    const platformName = this.getAttribute('data-platform');
                    const normalizedPlatform = platformName.toLowerCase() === 'youtube' ? 'youtube' : platformName;
                    
                    // Store the selected platform in localStorage
                    // Key: 'selectedPlatform'
                    // Value: platform name (youtube, Instagram, Facebook, TikTok, X)
                    localStorage.setItem('selectedPlatform', normalizedPlatform);
                    
                    // Redirect to the download page using Flask's url_for
                    window.location.href = '{{ url_for("download_page") }}';
                });
            });
        }

        // Run initialization when the page loads
        document.addEventListener('DOMContentLoaded', initializePlatformSelection);
    </script>
</body>
</html>
